name: Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Optional: override version (e.g. 2.0.0). Leave blank to auto-increment patch.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat VERSION)

          if [ -n "${{ inputs.version_override }}" ]; then
            NEW_VERSION="${{ inputs.version_override }}"
          else
            # Auto-increment patch (e.g. 1.0.0 → 1.0.1)
            IFS='.' read -r major minor patch <<< "$CURRENT"
            patch=$((patch + 1))
            NEW_VERSION="$major.$minor.$patch"
          fi

          BUILD_NUMBER="${{ github.run_number }}"

          echo "Bumping $CURRENT → $NEW_VERSION (build $BUILD_NUMBER)"

          # Update VERSION file (single source of truth)
          echo "$NEW_VERSION" > VERSION

          # Sync MARKETING_VERSION in Xcode project (Debug + Release configs)
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = ${NEW_VERSION};/g" \
            MyToday.xcodeproj/project.pbxproj

          # Sync CURRENT_PROJECT_VERSION (build number)
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/g" \
            MyToday.xcodeproj/project.pbxproj

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump version to ${{ steps.version.outputs.new_version }} (build ${{ steps.version.outputs.build_number }})"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:main --tags

      - name: Build and package
        run: bash scripts/package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: MyToday ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
          files: build/MyToday-${{ steps.version.outputs.new_version }}.pkg
